<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{SHEET_TITLE}} — figure sheet</title>
  <link rel="stylesheet" href="../artifact.css">
  <style>
    .figure { background: var(--paper); border: 1.5px solid var(--gray-300); border-radius: var(--r-md); padding: 20px; }
    .figure svg { display: block; width: 100%; height: auto; }
    .figure .caption { font-family: var(--mono); font-size: 11px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.06em; margin: 12px 0 0; }
    .figure h3 { font-size: 16px; margin: 4px 0 8px; }
  </style>
</head>
<body>
  <div class="page page-wide">

    <header>
      <p class="eyebrow with-rule">{{TEAM_OR_DOC}} · figure sheet</p>
      <h1>{{SHEET_TITLE}}</h1>
      <p class="lead">{{ONE_SENTENCE_LEAD — collection of small diagrams referenced from a longer doc}}</p>
    </header>

    <hr class="rule">

    <section>
      <div class="grid-2">

        <figure class="figure">
          <p class="caption">Fig 1</p>
          <h3>{{FIG_1_TITLE}}</h3>
          <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="100" r="34" fill="#FFFFFF" stroke="#141413" stroke-width="1.5"/>
            <text x="60" y="105" text-anchor="middle" font-family="system-ui" font-size="13" fill="#141413">A</text>
            <circle cx="200" cy="100" r="34" fill="#E3DACC" stroke="#141413" stroke-width="1.5"/>
            <text x="200" y="105" text-anchor="middle" font-family="system-ui" font-size="13" fill="#141413">B</text>
            <circle cx="340" cy="100" r="34" fill="rgba(120,140,93,0.16)" stroke="#141413" stroke-width="1.5"/>
            <text x="340" y="105" text-anchor="middle" font-family="system-ui" font-size="13" fill="#141413">C</text>
            <path d="M 94 100 L 166 100" stroke="#141413" stroke-width="1.5"/>
            <path d="M 234 100 L 306 100" stroke="#141413" stroke-width="1.5"/>
          </svg>
          <p class="mt-3 mb-0 muted small">{{FIG_1_CAPTION}}</p>
        </figure>

        <figure class="figure">
          <p class="caption">Fig 2</p>
          <h3>{{FIG_2_TITLE}}</h3>
          <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="40" y="40" width="100" height="60" rx="6" fill="#F0EEE6" stroke="#141413" stroke-width="1.5"/>
            <text x="90" y="76" text-anchor="middle" font-family="system-ui" font-size="13" fill="#141413">request</text>
            <rect x="260" y="40" width="100" height="60" rx="6" fill="#F0EEE6" stroke="#141413" stroke-width="1.5"/>
            <text x="310" y="76" text-anchor="middle" font-family="system-ui" font-size="13" fill="#141413">response</text>
            <rect x="150" y="120" width="100" height="60" rx="6" fill="rgba(217,119,87,0.16)" stroke="#141413" stroke-width="1.5"/>
            <text x="200" y="156" text-anchor="middle" font-family="system-ui" font-size="13" fill="#141413">handler</text>
            <path d="M 140 70 L 150 130" stroke="#141413" stroke-width="1.5" fill="none"/>
            <path d="M 250 130 L 260 70" stroke="#141413" stroke-width="1.5" fill="none"/>
          </svg>
          <p class="mt-3 mb-0 muted small">{{FIG_2_CAPTION}}</p>
        </figure>

        <figure class="figure">
          <p class="caption">Fig 3</p>
          <h3>{{FIG_3_TITLE}}</h3>
          <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="40" y="80" width="320" height="40" fill="#F0EEE6" stroke="#141413" stroke-width="1.5"/>
            <rect x="40" y="80" width="120" height="40" fill="#D97757" stroke="#141413" stroke-width="1.5"/>
            <text x="100" y="105" text-anchor="middle" font-family="system-ui" font-size="13" fill="#FAF9F5">used 38%</text>
            <text x="260" y="105" text-anchor="middle" font-family="system-ui" font-size="13" fill="#141413">free</text>
          </svg>
          <p class="mt-3 mb-0 muted small">{{FIG_3_CAPTION}}</p>
        </figure>

        <figure class="figure">
          <p class="caption">Fig 4</p>
          <h3>{{FIG_4_TITLE}}</h3>
          <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <polyline points="20,160 80,140 140,150 200,90 260,110 320,60 380,40" fill="none" stroke="#D97757" stroke-width="2"/>
            <line x1="20" y1="180" x2="380" y2="180" stroke="#87867F" stroke-width="1"/>
            <line x1="20" y1="20" x2="20" y2="180" stroke="#87867F" stroke-width="1"/>
            <circle cx="320" cy="60" r="4" fill="#D97757"/>
            <text x="328" y="56" font-family="ui-monospace, monospace" font-size="11" fill="#141413">peak</text>
          </svg>
          <p class="mt-3 mb-0 muted small">{{FIG_4_CAPTION}}</p>
        </figure>

      </div>
    </section>

    <hr class="rule mt-6">
    <p class="muted small">Generated {{ISO_DATE}} · sheet owner: {{NAME}}.</p>

  </div>
</body>
</html>
